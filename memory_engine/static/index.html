<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Engine AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <div class="container">
        <header>
            <h1>Memory <span>Engine</span></h1>
            <p>Your Agentic AI Second Brain</p>
        </header>

        <main>
            <section class="glass-panel upload-section">
                <h2>Upload Knowledge</h2>
                <div id="drop-zone" class="drop-zone">
                    <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                    <p>Drag & Drop a PDF or <span>Browse</span></p>
                    <input type="file" id="file-input" accept=".pdf" hidden>
                </div>
                <div id="upload-status" class="status-msg"></div>
            </section>

            <section class="glass-panel search-section">
                <h2>Semantic Retrieval</h2>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="What did I save about...">
                    <button id="search-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                </div>
                <div id="search-results" class="results-container">
                    <div class="empty-state">Your semantic search results will appear here...</div>
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
